networks:
  drclaw-net:
    name: drclaw-net

services:
  drclaw:
    image: ${REGISTRY:-ghcr.io/projectdrclaw}/drclaw:latest
    container_name: drclaw
    restart: unless-stopped
    ports:
      - "8088:8088"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=Asia/Shanghai
      - DRCLAW_AUTH_ENABLED=true
    volumes:
      - ./drclaw-data:/app/working
      - ./drclaw-secrets:/app/working.secret
      - ./drclaw-backups:/app/working.backups
    networks:
      - drclaw-net

  sensevoice:
    image: ${REGISTRY:-ghcr.io/projectdrclaw}/sensevoice:cpu
    container_name: drclaw-sensevoice
    restart: unless-stopped
    ports:
      - "8898:8898"
    networks:
      - drclaw-net



