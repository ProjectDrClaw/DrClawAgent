# Build Dr.Claw Desktop:
# - Legacy desktop: Windows (conda-pack + NSIS), macOS (conda-pack -> .app)
# - Tauri desktop: Windows/macOS app bundles with PyInstaller backend sidecar
# Runs on release publish and manual dispatch.

name: DrClaw Desktop Build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  # On release events, fail fast if the DashScope secret is missing.
  # Without it, the verifier would silently skip the LLM chat round
  # and emit a misleading "PASS". Forks / manual dispatch are allowed
  # to run without the secret (UI-load checks still execute).
  check-release-secrets:
    name: Check release secrets (release only)
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure DashScope secret is configured
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DRCLAW_DASHSCOPE_API_KEY || secrets.QWENPAW_DASHSCOPE_API_KEY }}
        run: |
          if [ -z "$DASHSCOPE_API_KEY" ]; then
            echo "::error::DRCLAW_DASHSCOPE_API_KEY is not set (compat QWENPAW_DASHSCOPE_API_KEY); release verification cannot validate the LLM chat round. Configure the repo secret before publishing."
            exit 1
          fi
          echo "DashScope secret present"

  build-windows:
    needs: [check-release-secrets]
    # Keep the legacy desktop packaging code in place, but do not build it.
    if: ${{ false }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version
        id: version
        uses: ./.github/actions/get-version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.11"
          activate-environment: "qwenpaw-build"
          condarc-file: .github/condarc
          conda-remove-defaults: false

      - name: Install NSIS
        uses: negrutiu/nsis-install@v2

      - name: Clean dist directory
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Remove-Item -Recurse -Force dist
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: Build Windows installer
        shell: pwsh
        run: conda run -n qwenpaw-build pwsh -File ./scripts/pack/build_win.ps1

      - name: List dist (on failure)
        if: failure()
        shell: pwsh
        run: |
          Write-Host "=== dist contents ==="
          Get-ChildItem -Path dist -Recurse -Depth 2 -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          if (Test-Path dist\win-unpacked) {
            Write-Host "=== dist\win-unpacked (first 30) ==="
            Get-ChildItem -Path dist\win-unpacked -ErrorAction SilentlyContinue | Select-Object -First 30 | ForEach-Object { $_.Name }
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DrClaw-Desktop-Windows-${{ steps.version.outputs.version }}
          path: dist/DrClaw-Setup-*.exe

  build-macos:
    needs: [check-release-secrets]
    # Keep the legacy desktop packaging code in place, but do not build it.
    if: ${{ false }}
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version
        id: version
        uses: ./.github/actions/get-version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.11"
          activate-environment: "qwenpaw-build"
          condarc-file: .github/condarc
          conda-remove-defaults: false

      - name: Clean dist directory
        run: rm -rf dist && mkdir -p dist

      - name: Build macOS .app
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          chmod +x scripts/pack/build_macos.sh
          conda run -n qwenpaw-build bash -c 'CREATE_ZIP=1 ./scripts/pack/build_macos.sh'

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: DrClaw-Desktop-macOS-${{ steps.version.outputs.version }}
          path: dist/DrClaw-*.zip

  build-tauri-windows:
    needs: [check-release-secrets]
    if: |
      always() &&
      (needs.check-release-secrets.result == 'success' ||
       needs.check-release-secrets.result == 'skipped')
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version
        id: version
        uses: ./.github/actions/get-version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging helper dependencies
        run: python -m pip install packaging

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: console/src-tauri

      - name: Install NSIS
        uses: negrutiu/nsis-install@v2

      - name: Clean dist directory
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Remove-Item -Recurse -Force dist
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: Build Tauri Windows package
        shell: pwsh
        env:
          # Authenticate the python-build-standalone release lookup in
          # stage_python_runtime.py to avoid anonymous API rate limits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/pack-tauri/build_win_pyinstaller.ps1

      - name: Stage Tauri Windows installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem "console/src-tauri/target/release/bundle/nsis/*.exe" |
            Select-Object -First 1
          if (-not $installer) { throw "No Tauri Windows installer found" }
          $target = "dist/DrClaw-Tauri-${{ steps.version.outputs.version }}-Windows-setup.exe"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Force $installer.FullName $target
          Write-Host "Staged: $target"

      - name: Verify desktop (Tauri Windows)
        timeout-minutes: 10
        uses: ./.github/actions/verify-tauri-windows
        with:
          dashscope-api-key: ${{ secrets.DRCLAW_DASHSCOPE_API_KEY || secrets.QWENPAW_DASHSCOPE_API_KEY }}

      - name: Stop desktop server (Tauri Windows)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          # Kill the Tauri shell and its sidecar subprocess by name.
          Get-Process -Name "drclaw-desktop" -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue
          Get-Process -Name "drclaw-backend" -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2
          Get-Process -Name "drclaw-desktop" -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue
          Get-Process -Name "drclaw-backend" -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue
          exit 0

      - name: Upload desktop verify logs (Tauri Windows)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-verify-logs-tauri-windows-${{ steps.version.outputs.version }}
          path: |
            ${{ runner.temp }}/drclaw-desktop-stdout.log
            ${{ runner.temp }}/drclaw-desktop-stderr.log
            ~/AppData/Local/io.drclaw.desktop/logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload verify screenshots (Tauri Windows)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-verify-screenshots-tauri-windows-${{ steps.version.outputs.version }}
          path: ${{ runner.temp }}/verify-screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Tauri Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DrClaw-Desktop-Tauri-Windows-${{ steps.version.outputs.version }}
          path: dist/DrClaw-Tauri-*-Windows-setup.exe

  build-tauri-macos:
    needs: [check-release-secrets]
    if: |
      always() &&
      (needs.check-release-secrets.result == 'success' ||
       needs.check-release-secrets.result == 'skipped')
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version
        id: version
        uses: ./.github/actions/get-version

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          PIP_NO_CACHE_DIR: "1"
        with:
          python-version: "3.11"

      - name: Install packaging helper dependencies
        run: python -m pip install packaging

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: console/src-tauri

      - name: Clean dist directory
        run: rm -rf dist && mkdir -p dist

      - name: Build Tauri macOS package
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          # Authenticate the python-build-standalone release lookup in
          # stage_python_runtime.py to avoid anonymous API rate limits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/pack-tauri/build_macos_pyinstaller.sh
          bash scripts/pack-tauri/build_macos_pyinstaller.sh

      - name: Verify desktop (Tauri macOS)
        timeout-minutes: 10
        uses: ./.github/actions/verify-tauri-macos
        with:
          dashscope-api-key: ${{ secrets.DRCLAW_DASHSCOPE_API_KEY || secrets.QWENPAW_DASHSCOPE_API_KEY }}

      - name: Stop desktop server (Tauri macOS)
        if: always()
        run: |
          # Kill the Tauri shell and its sidecar subprocess.
          pkill -f "Dr.Claw Desktop" 2>/dev/null || true
          pkill -f "drclaw-backend" 2>/dev/null || true
          sleep 2
          pkill -9 -f "Dr.Claw Desktop" 2>/dev/null || true
          pkill -9 -f "drclaw-backend" 2>/dev/null || true
          # Best-effort: kill anything sitting on the detected port.
          if [ -n "${BASE_URL:-}" ]; then
            PORT="${BASE_URL##*:}"
            lsof -ti:"$PORT" | xargs kill 2>/dev/null || true
          fi
          rm -rf dist/verify-tauri

      - name: Upload desktop verify logs (Tauri macOS)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-verify-logs-tauri-macos-${{ steps.version.outputs.version }}
          path: |
            ${{ runner.temp }}/drclaw-desktop-stdout.log
            ${{ runner.temp }}/drclaw-desktop-stderr.log
            ~/Library/Logs/io.drclaw.desktop/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload verify screenshots (Tauri macOS)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-verify-screenshots-tauri-macos-${{ steps.version.outputs.version }}
          path: ${{ runner.temp }}/verify-screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Tauri macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: DrClaw-Desktop-Tauri-macOS-${{ steps.version.outputs.version }}
          path: dist/DrClaw-Tauri-*-macOS.zip

  upload-release:
    needs: [build-tauri-windows, build-tauri-macos]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Move artifacts to root for upload
        run: |
          mv DrClaw-Desktop-Windows-*/DrClaw-Setup-*.exe . 2>/dev/null || true
          mv DrClaw-Desktop-macOS-*/DrClaw-*.zip . 2>/dev/null || true
          mv DrClaw-Desktop-Tauri-Windows-*/DrClaw-Tauri-*-Windows-setup.exe . 2>/dev/null || true
          mv DrClaw-Desktop-Tauri-macOS-*/DrClaw-Tauri-*-macOS.zip . 2>/dev/null || true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DrClaw-Setup-*.exe
            DrClaw-[0-9]*-macOS.zip
            DrClaw-Tauri-*-Windows-setup.exe
            DrClaw-Tauri-*-macOS.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
