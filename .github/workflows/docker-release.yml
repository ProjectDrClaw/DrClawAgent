# Build Dr.Claw multi-arch Docker image and push to GitHub Container Registry on release.
# Pre-release: update <version> and pre only.
# Formal release: update <version>, pre and latest.
#
# Pipeline: verify (build amd64 + health-check) → build-and-push (multi-arch).
name: DrClaw Docker Build and Push on Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (e.g. v1.2.3 or v1.2.3-beta.1)"
        required: true
        type: string
      is_prerelease:
        description: "Pre-release (do not update latest tag)"
        required: false
        type: boolean
        default: false

env:
  GITHUB_REGISTRY: ghcr.io
  IMAGE: ${{ github.repository_owner }}/drclaw

jobs:
  verify-docker:
    uses: ./.github/workflows/release-verify.yml
    with:
      verify_docker: true
      docker_node_image: node:20-slim
      docker_uv_image: ghcr.io/astral-sh/uv:latest
    secrets: inherit

  build-and-push:
    needs: [verify-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clean disk space
        run: docker system prune -af

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version and prerelease flag
        id: vars
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT

            if [[ "$VERSION" =~ (beta|alpha|rc|dev) ]]; then
              echo "is_prerelease=true" >> $GITHUB_OUTPUT
            elif [[ "$VERSION" =~ post ]]; then
              echo "is_prerelease=false" >> $GITHUB_OUTPUT
            else
              echo "is_prerelease=${{ github.event.release.prerelease }}" >> $GITHUB_OUTPUT
            fi
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "is_prerelease=${{ github.event.inputs.is_prerelease }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push multi-arch (version + pre [+ latest])
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          IS_PRERELEASE: ${{ steps.vars.outputs.is_prerelease }}
          DRCLAW_DISABLED_CHANNELS: "imessage"
        run: |
          # GHCR 仓库名必须全小写（owner 可能含大写，如 ProjectDrClaw）
          IMAGE_REF="$(echo "${GITHUB_REGISTRY}/${IMAGE}" | tr '[:upper:]' '[:lower:]')"
          TAGS="-t ${IMAGE_REF}:${VERSION} -t ${IMAGE_REF}:pre"
          if [ "${IS_PRERELEASE}" != "true" ]; then
            TAGS="${TAGS} -t ${IMAGE_REF}:latest"
          fi
          docker buildx build --platform linux/amd64,linux/arm64 \
            -f deploy/Dockerfile \
            --build-arg NODE_IMAGE=node:20-slim \
            --build-arg UV_IMAGE=ghcr.io/astral-sh/uv:latest \
            --build-arg DRCLAW_DISABLED_CHANNELS="${DRCLAW_DISABLED_CHANNELS}" \
            ${TAGS} --push .
